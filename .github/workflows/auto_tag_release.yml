name: Auto Tag Release

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - Go Test
    types:
      - completed

jobs:
  tag:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create next tag
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          current_tag="$(git tag --points-at "$RELEASE_SHA" --list 'v*.*.*' | head -n 1)"
          if [ -n "$current_tag" ]; then
            echo "Commit already tagged with $current_tag, skipping."
            exit 0
          fi

          last_tag="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)"
          if [ -z "$last_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${last_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$next_tag" "$RELEASE_SHA" -m "Release $next_tag"
          git push origin "$next_tag"
          echo "Created $next_tag for $RELEASE_SHA"
